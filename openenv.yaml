spec_version: 1
name: pollution-exposure-minimizer-environment
version: "1.0.0"
author: Swasti
description: >
  An OpenEnv benchmark for urban commuting under pollution risk.
  The agent plans a route across a Delhi-inspired transport graph while
  balancing exposure, travel time, allowed modes, and dynamic AQI.
type: space
runtime: fastapi
app: server.app:app
port: 7680
base_path: /demo

observation_space:
  type: structured
  description: >
    Current node, destination, current hour, cumulative exposure, travel time,
    remaining steps, legal actions, and graph metadata.

action_space:
  type: discrete
  actions:
    - move
    - wait
  description: >
    Move along a legal edge or wait when the task allows it.

endpoints:
  health: /health
  reset: /reset
  step: /step
  state: /state
  tasks: /tasks
  baseline: /baseline
  grader: /grader

tasks:
  - id: easy_static_route
    name: Easy Static AQI Route
    difficulty: easy
    description: >
      Walk from North Campus to Nehru Place while minimizing pollution exposure on a static AQI map.
    max_steps: 8
    grader:
      module: tasks.grader
      function: grade_task
    ideal_action: walk-only route to Nehru Place
  - id: medium_multimodal_route
    name: Medium Multimodal Southbound Commute
    difficulty: medium
    description: >
      Commute from Karol Bagh to Saket using walk, bus, and metro while balancing pollution and travel time.
    max_steps: 9
    grader:
      module: tasks.grader
      function: grade_task
    ideal_action: multimodal southbound commute
  - id: hard_dynamic_peak_route
    name: Hard Dynamic Peak Routing
    difficulty: hard
    description: >
      Travel from Civil Lines to Okhla during peak conditions with dynamic AQI and optional waiting.
    max_steps: 9
    grader:
      module: tasks.grader
      function: grade_task
    ideal_action: dynamic peak-hour route with waiting tradeoffs
  - id: bonus_dynamic_cross_city_route
    name: Bonus Dynamic Cross-City Route
    difficulty: hard
    description: >
      Travel from Karol Bagh to Okhla Phase II during peak conditions with dynamic AQI and multimodal choices.
    max_steps: 10
    grader:
      module: tasks.grader
      function: grade_task
    ideal_action: longer cross-city multimodal route

grader:
  module: tasks.grader
  function: grade_task

agent:
  baseline: inference.py
  type: llm-agent

scoring:
  reward_range: [0.01, 0.99]
  success_threshold: 0.5
  score_formula: normalized_grader_score

constraints:
  max_runtime_seconds: 1200
  max_memory_gb: 8
  max_vcpu: 2
